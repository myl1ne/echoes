steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - europe-west1-docker.pkg.dev/$PROJECT_ID/echoes/app:$COMMIT_SHA
      - .

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - europe-west1-docker.pkg.dev/$PROJECT_ID/echoes/app:$COMMIT_SHA

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - echoes
      - --image=europe-west1-docker.pkg.dev/$PROJECT_ID/echoes/app:$COMMIT_SHA
      - --region=europe-west1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --set-env-vars=STORAGE_BACKEND=firestore,CASSANDRA_MODEL=claude-sonnet-4-6
      # When Reddit secrets are created in GCP, append to --set-secrets:
      # ,REDDIT_CLIENT_ID=reddit-client-id:latest,REDDIT_CLIENT_SECRET=reddit-client-secret:latest,REDDIT_USERNAME=reddit-username:latest,REDDIT_PASSWORD=reddit-password:latest
      - --set-secrets=ANTHROPIC_API_KEY=anthropic-api-key:latest,ELEVENLABS_API_KEY=elevenlabs-api-key:latest,CASSANDRA_ADMIN_TOKEN=cassandra-admin-token:latest,TAVILY_API_KEY=tavily-api-key:latest

images:
  - europe-west1-docker.pkg.dev/$PROJECT_ID/echoes/app:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
