<!-- Echo Bird Icon - Minimal SVG for Echoes -->
<!-- Place in: /src/assets/ or inline in React component -->
<!-- Designed to match glass-morphism aesthetic -->

<svg 
  width="40" 
  height="40" 
  viewBox="0 0 40 40" 
  fill="none" 
  xmlns="http://www.w3.org/2000/svg"
  class="echo-bird"
>
  <!-- Bird silhouette - simple, elegant, liminal -->
  
  <!-- Body -->
  <ellipse 
    cx="20" 
    cy="24" 
    rx="8" 
    ry="10" 
    fill="currentColor" 
    opacity="0.7"
  />
  
  <!-- Head -->
  <circle 
    cx="20" 
    cy="14" 
    r="6" 
    fill="currentColor" 
    opacity="0.7"
  />
  
  <!-- Beak -->
  <path 
    d="M 26 14 L 30 13 L 26 15 Z" 
    fill="currentColor" 
    opacity="0.6"
  />
  
  <!-- Eye (small dot) -->
  <circle 
    cx="22" 
    cy="13" 
    r="1.5" 
    fill="rgba(255, 255, 255, 0.9)"
  />
  
  <!-- Wing (folded) -->
  <path 
    d="M 15 22 Q 10 24 12 28 L 15 26 Z" 
    fill="currentColor" 
    opacity="0.5"
  />
  
  <!-- Tail feathers -->
  <path 
    d="M 18 32 L 15 38 M 20 32 L 20 38 M 22 32 L 25 38" 
    stroke="currentColor" 
    stroke-width="1.5" 
    stroke-linecap="round" 
    opacity="0.6"
  />
  
  <!-- Subtle glow effect (optional) -->
  <circle 
    cx="20" 
    cy="20" 
    r="18" 
    fill="none" 
    stroke="currentColor" 
    stroke-width="0.5" 
    opacity="0.2"
  />
</svg>

